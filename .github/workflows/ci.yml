name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: banking_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Ruff
      run: |
        ruff check app/ pipelines/ tests/ || true

    - name: Format check with Black
      run: |
        black --check app/ pipelines/ tests/ || true

    - name: Type check with MyPy
      run: |
        mypy app/ pipelines/ --ignore-missing-imports || true

    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/banking_db
      run: |
        pytest -v --cov=app --cov=pipelines --cov-report=xml tests/test_models.py tests/test_data_generation.py || true

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  build-docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t banking-dashboard:latest .

    - name: Run Docker compose test
      run: |
        docker compose config

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install bandit safety

    - name: Run Bandit
      run: |
        bandit -r app/ pipelines/ || true

    - name: Check dependencies
      run: |
        pip install safety
        safety check --file requirements.txt || true
