services:
  - type: web
    name: banking-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        scope: shared
      - key: PYTHON_VERSION
        value: "3.11"

  - type: web
    name: banking-dashboard
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app/dashboard/main.py --server.port=$PORT --server.address=0.0.0.0"
    envVars:
      - key: DATABASE_URL
        scope: shared

  - type: pserv
    name: banking-postgres
    plan: free
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: banking_db
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        scope: shared
